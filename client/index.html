<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/omni-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OMNI IDE — AI-Powered Code Editor</title>
    <meta name="description" content="Premium AI-powered coding IDE with GitHub integration, Monaco editor, and intelligent code generation." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      body {
        background: #0a0e1a;
        color: #e2e8f0;
        margin: 0;
        font-family: 'Inter', system-ui, sans-serif;
        overflow: hidden;
      }
      #root { width: 100vw; height: 100vh; overflow: hidden; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0f1525; }
      ::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #00d4ff44; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
