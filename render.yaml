services:
  - type: web
    name: omni-ide
    env: node
    region: oregon
    plan: free
    buildCommand: npm_config_production=false npm install && cd client && npm_config_production=false npm install && NODE_OPTIONS=--max-old-space-size=512 npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false
      - key: NODE_VERSION
        value: 20.20.0
